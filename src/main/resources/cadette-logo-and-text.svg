<svg
  width="300"
  height="120"
  viewBox="0 0 300 120"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  style="filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.1)) drop-shadow(0 4px 6px rgba(0, 0, 0, 0.05));"
>
  <!-- Wood plank background shape -->
  <rect
    x="10"
    y="20"
    width="80"
    height="80"
    rx="8"
    fill="#8B4513"
    opacity="0.9"
  />

  <!-- Wood grain lines -->
  <path
    d="M 20 30 Q 30 50, 25 70 M 35 25 Q 45 55, 40 85 M 50 30 Q 60 50, 55 75 M 65 35 Q 75 55, 70 80"
    stroke="#6B3410"
    stroke-width="1.5"
    opacity="0.4"
    fill="none"
  />

  <!-- Compass/divider tool overlaying the wood -->
  <g transform="translate(50, 50)">
    <!-- Left leg of compass -->
    <line
      x1="0"
      y1="-20"
      x2="-11"
      y2="25"
      stroke="#1e40af"
      stroke-width="3"
      stroke-linecap="round"
    />
    <!-- Right leg of compass -->
    <line
      x1="0"
      y1="-20"
      x2="11"
      y2="25"
      stroke="#1e40af"
      stroke-width="3"
      stroke-linecap="round"
    />
    <!-- Pivot point -->
    <circle cx="0" cy="-20" r="4" fill="#1e40af" />
    <!-- Left foot -->
    <circle cx="-11" cy="25" r="2.5" fill="#1e40af" />
    <!-- Right pencil tip -->
    <path
      d="M 9 25 L 13 25 L 11 30 Z"
      fill="#1e40af"
    />
  </g>

  <!-- CADette text -->
  <text
    x="105"
    y="70"
    fill="#1e293b"
    font-size="48"
    font-weight="700"
    font-family="system-ui, -apple-system, sans-serif"
    letter-spacing="-0.96"
  >
    CAD
  </text>
  <text
    x="205"
    y="70"
    fill="#b45309"
    font-size="48"
    font-weight="600"
    font-family="system-ui, -apple-system, sans-serif"
    letter-spacing="-0.96"
  >
    ette
  </text>

  <!-- Tagline -->
  <text
    x="105"
    y="90"
    fill="#64748b"
    font-size="12"
    font-weight="500"
    font-family="system-ui, -apple-system, sans-serif"
    letter-spacing="0.6"
  >
    PRECISION WOODWORKING
  </text>
</svg>
